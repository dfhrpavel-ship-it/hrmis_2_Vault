        Loading.hide();
        this.expenses = res.success ? (res.data||[]) : [];
        const pending = this.expenses.filter(e=>e.Status==='Pending');
        const approved = this.expenses.filter(e=>e.Status==='Approved');
        const totalAmount = this.expenses.reduce((s,e)=>s+(parseFloat(e.Amount)||0),0);
        const pendingAmount = pending.reduce((s,e)=>s+(parseFloat(e.Amount)||0),0);

        U.id('pageContent').innerHTML = `
        <div class="page-header"><h1><i class="fas fa-plane"></i> Travel & Expense Management</h1></div>
        <div class="page-body">
        <div class="stats-grid">
            <div class="stat-card orange"><div class="stat-icon"><i class="fas fa-clock"></i></div><div class="stat-value">${pending.length}</div><div class="stat-label">Pending (BDT ${U.formatCurrency(pendingAmount)})</div></div>
            <div class="stat-card green"><div class="stat-icon"><i class="fas fa-check-circle"></i></div><div class="stat-value">${approved.length}</div><div class="stat-label">Approved</div></div>
            <div class="stat-card purple"><div class="stat-icon"><i class="fas fa-money-bill-wave"></i></div><div class="stat-value">${U.formatCurrency(totalAmount)}</div><div class="stat-label">Total Amount</div></div>
        </div>
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-filter"></i> Filters</h3></div>
            <div class="filter-bar">
                <select class="form-select form-input-sm" id="expFilterStatus" onchange="Pages['travel-expense-admin'].filter()"><option value="">All Status</option><option>Pending</option><option>Approved</option><option>Rejected</option></select>
                <input type="text" class="form-input form-input-sm" id="expFilterEmp" placeholder="Search by employee..." oninput="Pages['travel-expense-admin'].filter()" style="width:200px">
            </div>
        </div>
        <div class="table-container">
        <table>
        <thead><tr><th>ID</th><th>Employee</th><th>Date</th><th>Type</th><th>Description</th><th>Amount</th><th>Status</th><th>Actions</th></tr></thead>
        <tbody id="expenseAdminBody">
        ${this.expenses.map(e => this.renderRow(e)).join('') || '<tr><td colspan="8"><div class="empty-state"><i class="fas fa-receipt"></i><p>No expenses found</p></div></td></tr>'}
        </tbody>
        </table>
        </div>
        </div>`;
    },
    renderRow(e){
        const statusClass = e.Status==='Approved'?'badge-success':e.Status==='Rejected'?'badge-danger':'badge-warning';
        return `<tr data-status="${U.escHtml(e.Status||'')}" data-emp="${(U.escHtml(e.Name||'')+' '+U.escHtml(e.EmpID||'')).toLowerCase()}">
            <td><span class="tag">${U.escHtml((e.ExpenseID||'').split('_').pop()||'')}</span></td>
            <td><strong>${U.escHtml(e.Name||'')}</strong><br><span class="text-muted" style="font-size:.75rem">${U.escHtml(e.EmpID||'')}</span></td>
            <td>${U.formatDate(e.Date)}</td>
            <td><span class="badge badge-info">${U.escHtml(e.ExpenseType||'')}</span></td>
            <td>${U.escHtml(e.Description||'-')}</td>
            <td><strong>${U.formatCurrency(e.Amount)}</strong></td>
            <td><span class="badge ${statusClass}">${U.escHtml(e.Status||'Pending')}</span></td>
            <td class="flex-gap">${e.Status==='Pending'?`
                <button class="btn btn-sm btn-success" onclick="Pages['travel-expense-admin'].updateStatus('${e.ExpenseID}','Approved')"><i class="fas fa-check"></i></button>
                <button class="btn btn-sm btn-danger" onclick="Pages['travel-expense-admin'].updateStatus('${e.ExpenseID}','Rejected')"><i class="fas fa-times"></i></button>
            `:'<span class="text-muted" style="font-size:.8rem">Processed</span>'}</td>
        </tr>`;
    },
    filter(){
        const status = U.val('expFilterStatus')||'';
        const emp = (U.val('expFilterEmp')||'').toLowerCase();
        U.$$('#expenseAdminBody tr').forEach(tr => {
            const matchStatus = !status || tr.getAttribute('data-status') === status;
            const matchEmp = !emp || tr.getAttribute('data-emp').includes(emp);
            tr.style.display = (matchStatus && matchEmp) ? '' : 'none';
        });
    },
    async updateStatus(expenseID, status){
        Loading.show();
        const res = await API.updateExpenseStatus(expenseID, status);
        Loading.hide();
        if(res.success){ Toast.success('Expense ' + status); this.render(); }
        else Toast.error(res.error || 'Failed to update');
    }
};

                <option value="Transport">Transport</option><option value="Accommodation">Accommodation</option>
                <option value="Meals">Meals</option><option value="Client Meeting">Client Meeting</option>
                <option value="Office Supplies">Office Supplies</option><option value="Other">Other</option>
            </select></div>
            <div class="form-group"><label>Date</label><input type="date" class="form-input" id="expDate" value="${U.today()}"></div>
            <div class="form-group"><label>Description</label><textarea class="form-textarea" id="expDesc" placeholder="Describe the expense..." rows="3"></textarea></div>
            <div class="form-group"><label>Amount (BDT)</label><input type="number" class="form-input" id="expAmount" placeholder="Enter amount"></div>`,
            `<button class="btn btn-outline btn-sm" onclick="Modal.close()">Cancel</button>
             <button class="btn btn-primary btn-sm" onclick="Pages['my-expenses'].submit()"><i class="fas fa-paper-plane"></i> Submit</button>`

Pages['shift-roster'] = {
    roster: [],
    weekStart: null,
    async render(){
        if(App.state.role!=='Admin'){Toast.error('Access denied');return;}
        Loading.show();
        const res = await API.getShiftRoster();
        Loading.hide();
        this.roster = res.success ? (res.data||[]) : [];

        // Get current week start (Monday)
        const today = new Date();
        const dayOfWeek = today.getDay();
        const diff = dayOfWeek === 0 ? 6 : dayOfWeek - 1;
        this.weekStart = new Date(today);
        this.weekStart.setDate(today.getDate() - diff);
        const weekEnd = new Date(this.weekStart);
        weekEnd.setDate(this.weekStart.getDate() + 6);

        // Today's date string
        const todayStr = U.today();
        const activeRoster = this.roster.filter(r => r.IsActive === 'Yes');

        // Stats for today
        const todayRoster = activeRoster.filter(r => {
            const d = typeof r.Date === 'string' ? r.Date.split('T')[0] : r.Date;
            return d === todayStr;
        });
        const dayShift = todayRoster.filter(r => r.ShiftName === 'Day').length;
        const nightShift = todayRoster.filter(r => r.ShiftName === 'Night').length;

        // Generate week dates
        const weekDates = [];
        for(let i = 0; i < 7; i++){
            const d = new Date(this.weekStart);
            d.setDate(this.weekStart.getDate() + i);
            weekDates.push(U.formatDateISO(d));
        }
        const dayNames = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];

        // Group roster by employee for the week
        const empMap = {};
        activeRoster.forEach(r => {
            if(!empMap[r.EmpID]) empMap[r.EmpID] = { name: r.Name || r.EmpID, shifts: {} };
            const d = typeof r.Date === 'string' ? r.Date.split('T')[0] : r.Date;
            empMap[r.EmpID].shifts[d] = r;
        });
        const empIDs = Object.keys(empMap);

        U.id('pageContent').innerHTML = `
        <div class="page-header"><h1><i class="fas fa-clock"></i> Shift & Roster Management</h1>
            <button class="btn btn-primary btn-sm" onclick="Pages['shift-roster'].openAssignForm()"><i class="fas fa-plus"></i> Assign Shift</button>
        </div>
        <div class="page-body">
        <div class="stats-grid">
            <div class="stat-card blue"><div class="stat-icon"><i class="fas fa-sun"></i></div><div class="stat-value">${dayShift}</div><div class="stat-label">Day Shift Today</div></div>
            <div class="stat-card purple"><div class="stat-icon"><i class="fas fa-moon"></i></div><div class="stat-value">${nightShift}</div><div class="stat-label">Night Shift Today</div></div>
            <div class="stat-card green"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-value">${empIDs.length}</div><div class="stat-label">Employees on Roster</div></div>
        </div>
        <div class="card">
            <div class="card-header">
                <h3><i class="fas fa-calendar-week"></i> Weekly Roster View</h3>
                <div class="flex-gap">
                    <button class="btn btn-sm btn-outline" onclick="Pages['shift-roster'].changeWeek(-1)"><i class="fas fa-chevron-left"></i></button>
                    <strong style="font-size:.9rem">${U.formatDate(weekDates[0])} — ${U.formatDate(weekDates[6])}</strong>
                    <button class="btn btn-sm btn-outline" onclick="Pages['shift-roster'].changeWeek(1)"><i class="fas fa-chevron-right"></i></button>
                </div>
            </div>
            <div class="roster-grid" style="overflow-x:auto">
                <div class="roster-cell roster-header">Employee</div>
                ${dayNames.map((dn,i) => `<div class="roster-cell roster-header">${dn}<br><span style="font-size:.65rem;opacity:.7">${weekDates[i].split('-').slice(1).join('/')}</span></div>`).join('')}
                ${empIDs.length ? empIDs.map(eid => {
                    const emp = empMap[eid];
                    return `<div class="roster-cell roster-emp-name" title="${U.escHtml(emp.name)} (${U.escHtml(eid)})">${U.escHtml(emp.name)}</div>
                    ${weekDates.map(d => {
                        const shift = emp.shifts[d];
                        if(shift){
                            const cls = shift.ShiftName==='Day'?'day':shift.ShiftName==='Night'?'night':'custom';
                            return `<div class="roster-cell"><span class="shift-badge ${cls}"><i class="fas fa-${shift.ShiftName==='Day'?'sun':shift.ShiftName==='Night'?'moon':'clock'}"></i> ${shift.StartTime||''}-${shift.EndTime||''}</span></div>`;
                        }
                        return `<div class="roster-cell"><span class="shift-badge off">Off</span></div>`;
                    }).join('')}`;
                }).join('') : `<div class="roster-cell" style="grid-column:span 8"><div class="empty-state"><i class="fas fa-calendar-times"></i><p>No shifts assigned this week</p></div></div>`}
            </div>
        </div>
        <div class="card">
            <div class="card-header"><h3><i class="fas fa-list"></i> All Shift Assignments</h3></div>
            <div class="table-container">
            <table>
            <thead><tr><th>Employee</th><th>Date</th><th>Shift</th><th>Time</th><th>Active</th><th>Actions</th></tr></thead>
            <tbody>
            ${activeRoster.slice(0, 50).map(r => `
                <tr>
                    <td><strong>${U.escHtml(r.Name||'')}</strong><br><span class="text-muted" style="font-size:.75rem">${U.escHtml(r.EmpID||'')}</span></td>
                    <td>${U.formatDate(r.Date)}</td>
                    <td><span class="shift-badge ${r.ShiftName==='Day'?'day':r.ShiftName==='Night'?'night':'custom'}"><i class="fas fa-${r.ShiftName==='Day'?'sun':r.ShiftName==='Night'?'moon':'clock'}"></i> ${U.escHtml(r.ShiftName||'')}</span></td>
                    <td>${U.escHtml(r.StartTime||'')} - ${U.escHtml(r.EndTime||'')}</td>
                    <td><span class="badge badge-${r.IsActive==='Yes'?'success':'danger'}">${U.escHtml(r.IsActive||'No')}</span></td>
                    <td><button class="btn btn-sm btn-danger" onclick="Pages['shift-roster'].deactivate('${r.RosterID}')"><i class="fas fa-times"></i></button></td>
                </tr>
            `).join('') || '<tr><td colspan="6"><div class="empty-state"><p>No shift assignments</p></div></td></tr>'}
            </tbody>
            </table>
            </div>
        </div>
        </div>`;
    },
    changeWeek(offset){
        this.weekStart.setDate(this.weekStart.getDate() + (offset * 7));
        this.render();
    },
    openAssignForm(){
        Loading.show();
        API.getEmployees().then(res => {
            Loading.hide();
            const emps = res.success ? (res.data||[]) : [];
            Modal.open(
                '<i class="fas fa-user-clock"></i> <span>Assign Shift</span>',
                `<div class="form-group"><label>Employee</label><select class="form-select" id="shiftEmp">${emps.map(e=>`<option value="${e.empID||e['Employee ID']}" data-name="${U.escHtml(e.fullName||e['FULL NAME (As per NID)']||'')}">${U.escHtml(e.fullName||e['FULL NAME (As per NID)']||'')} (${e.empID||e['Employee ID']})</option>`).join('')}</select></div>
                <div class="form-group"><label>Shift Type</label><select class="form-select" id="shiftType" onchange="Pages['shift-roster'].onShiftTypeChange()">
                    <option value="Day">Day (09:00 - 18:00)</option>
                    <option value="Night">Night (18:00 - 06:00)</option>
                    <option value="Custom">Custom</option>
                </select></div>
                <div id="customTimeFields" class="hidden"><div class="form-row">
                    <div class="form-group"><label>Start Time</label><input type="time" class="form-input" id="shiftStart" value="09:00"></div>
                    <div class="form-group"><label>End Time</label><input type="time" class="form-input" id="shiftEnd" value="18:00"></div>
                </div></div>
                <div class="form-group"><label>Date From</label><input type="date" class="form-input" id="shiftDateFrom" value="${U.today()}"></div>
                <div class="form-group"><label>Date To</label><input type="date" class="form-input" id="shiftDateTo" value="${U.today()}"></div>
                <p class="text-muted" style="font-size:.8rem"><i class="fas fa-info-circle"></i> Shift will be assigned for each day in the date range (excluding weekends).</p>`,
                `<button class="btn btn-outline btn-sm" onclick="Modal.close()">Cancel</button>
                 <button class="btn btn-primary btn-sm" onclick="Pages['shift-roster'].submitAssign()"><i class="fas fa-save"></i> Assign</button>`
            );
        });
    },
    onShiftTypeChange(){
        const type = U.val('shiftType');
        const custom = U.id('customTimeFields');
        if(custom) custom.classList.toggle('hidden', type !== 'Custom');
    },
    async submitAssign(){
        const empSelect = U.id('shiftEmp');
        const empID = empSelect ? empSelect.value : '';
        const name = empSelect ? empSelect.options[empSelect.selectedIndex].getAttribute('data-name') : '';
        const shiftType = U.val('shiftType');
        const dateFrom = U.val('shiftDateFrom');
        const dateTo = U.val('shiftDateTo');
        if(!empID || !dateFrom || !dateTo){Toast.error('Employee and dates are required');return;}
        if(dateFrom > dateTo){Toast.error('Date From must be before Date To');return;}

        let startTime = '09:00', endTime = '18:00';
        if(shiftType === 'Day'){ startTime = '09:00'; endTime = '18:00'; }
        else if(shiftType === 'Night'){ startTime = '18:00'; endTime = '06:00'; }
        else { startTime = U.val('shiftStart') || '09:00'; endTime = U.val('shiftEnd') || '18:00'; }

        // Generate dates (skip weekends)
        const dates = [];
        const current = new Date(dateFrom);
        const end = new Date(dateTo);
        while(current <= end){
            const day = current.getDay();
            if(day !== 0 && day !== 6){
                dates.push(U.formatDateISO(current));
            }
            current.setDate(current.getDate() + 1);
        }

        Loading.show();
        let successCount = 0;
        for(const date of dates){
            const res = await API.saveShiftRoster({ empID, name, date, shiftName: shiftType, startTime, endTime, isActive: 'Yes' });
            if(res.success) successCount++;
        }
        Loading.hide();
        if(successCount > 0){ Toast.success(`Shift assigned for ${successCount} day(s)`); Modal.close(); this.render(); }
        else Toast.error('Failed to assign shift');
    },
    async deactivate(rosterID){
        Loading.show();
        const res = await API.saveShiftRoster({ rosterID, isActive: 'No' });
        Loading.hide();
        if(res.success){ Toast.success('Shift deactivated'); this.render(); }
        else Toast.error(res.error || 'Failed');
    }
};

// ============================================================
// INITIALIZATION
// ============================================================
window.addEventListener('DOMContentLoaded', () => {
    App.initDarkMode();
    // Safety: always hide loader after max 4s even if errors occur
    const safetyTimer = setTimeout(() => {
        const loader = document.getElementById('appLoader');
        if(loader && !loader.classList.contains('hidden')){
            loader.classList.add('hidden');
            document.getElementById('loginScreen').classList.remove('hidden');
            document.getElementById('loginScreen').style.display = '';
        }
    }, 4000);
    setTimeout(() => { clearTimeout(safetyTimer); try { App.init(); } catch(e) { console.error('Init error:', e); document.getElementById('appLoader').classList.add('hidden'); document.getElementById('loginScreen').classList.remove('hidden'); } }, 800);

    // Close modals on overlay click
    U.id('modalOverlay').addEventListener('click', e => { if(e.target === U.id('modalOverlay')) Modal.close(); });
    U.id('confirmOverlay').addEventListener('click', e => { if(e.target === U.id('confirmOverlay')) Confirm.close(); });

    // Handle back button
    window.addEventListener('popstate', () => {
        if(App.state.token) App.navigate(App.state.currentPage);
    });

    // Keyboard shortcut
    document.addEventListener('keydown', e => {
        if(e.key === 'Escape'){ Modal.close(); Confirm.close(); }
    });

    // Mobile menu button - add hamburger to page header
    const observer = new MutationObserver(() => {
        const header = U.$('.page-header');
        if(header && !U.id('menuBtn')){
            const btn = document.createElement('button');
            btn.id = 'menuBtn';
            btn.className = 'btn btn-icon';
            btn.style.cssText = 'display:none;background:var(--card);border:1px solid var(--border);cursor:pointer';
            btn.innerHTML = '<i class="fas fa-bars"></i>';
            btn.onclick = () => App.toggleSidebar();
            header.prepend(btn);
        }
        const mb = U.id('menuBtn');
        if(mb) mb.style.display = window.innerWidth<=768 ? 'flex' : 'none';
    });
    observer.observe(document.body, { childList:true, subtree:true });
});
</script>
